spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mes_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

# JWT配置
jwt:
  secret: ${JWT_SECRET:mesFrameworkSecretKey123456}
  expiration: 3600000  # 1小时

# 文件上传配置
file:
  upload-path: D:\FILE
  chunk-size: 10485760  # 10MB
