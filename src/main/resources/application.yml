spring:
  profiles:
    active: dev
  application:
    name: mes-framework
  mvc:
    path match:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 10MB       # 单个文件最大大小
      max-request-size: 50MB    # 单次请求总大小
      enabled: true             # 开启multipart支持

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mes.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8080
  servlet:
    context-path: /api
    multipart:
      max-file-size: 10MB       # 单个文件最大大小
      max-request-size: 50MB    # 单次请求总大小
      enabled: true             # 开启multipart支持
  max-http-header-size: 102400
  tomcat:
    max-http-form-post-size: -1

IP: http://192.168.2.48:9527

file:
  upload-path: D:\FILE
  chunk-size: 10485760  # 10MB